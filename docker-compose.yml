version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - BACKEND_PORT=5000
      - BACKEND_HOST=0.0.0.0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tramites_db
      - DB_USER=usuario
      - DB_PASSWORD=contraseña
    volumes:
      - ./backend:/app
    depends_on:
      - db

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:5000
    volumes:
      - ./bot:/app
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - FRONTEND_PORT=3000
      - FRONTEND_HOST=0.0.0.0
    volumes:
      - ./frontend:/app

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=tramites_db
      - POSTGRES_USER=usuario
      - POSTGRES_PASSWORD=contraseña
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data: